<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>
        Abdoul-Akim's Background Remover
    </title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&amp;family=Space+Grotesk:wght@400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                Abdoul-Akim's Background Remover
            </h1>
            <p>
                Remove backgrounds instantly and quickly
            </p>
        </div>
        <div class="card">
            <form id="upload-form">
                <div class="upload-area" id="upload-area">
                    <input accept="image/png,image/jpeg,image/webp" id="file-input" type="file" />
                    <div class="upload-icon">
                        📸
                    </div>
                    <div class="upload-text" id="upload-text">
                        Choose an Image
                    </div>
                    <div class="upload-hint">
                        PNG, JPG, or WEBP
                    </div>
                </div>
                <button class="btn btn-primary" id="submit-btn" style="margin-top: 16px;" type="submit">
                    Remove Background
                </button>
            </form>
        </div>
        <div class="status info" id="status">
            Ready to process your image now
        </div>
        <div class="card">
            <div class="preview-container">
                <div class="preview-wrapper">
                    <img alt="Original" class="preview-image" id="original-image" style="clip-path: inset(0 0 0 0);" />
                    <img alt="Processed" class="preview-image" id="processed-image" />
                    <div class="preview-placeholder" id="preview-placeholder">
                        No image selected yet
                    </div>
                </div>
            </div>
            <div class="slider-container hidden" id="slider-container">
                <input class="slider" id="comparison-slider" max="100" min="0" type="range" value="100" />
                <div class="slider-labels">
                    <span>
                        Original
                    </span>
                    <span>
                        Processed
                    </span>
                </div>
            </div>
            <button class="btn btn-secondary hidden" id="download-btn">
                Download PNG
            </button>
        </div>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <p>
                Project by
                <a href="" rel="noopener noreferrer" target="_blank">
                    DRABO  Abdoul Azouzoul Akim
                </a>
            </p>
            <div class="footer-links">
                <a href="https://github.com/AZOUZOUL/" rel="noopener noreferrer" target="_blank">
                    GitHub
                </a>
            </div>
        </div>
    </footer>
    <script src="app.js">
    </script>
</body>
    
</html>
